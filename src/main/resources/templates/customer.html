<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" th:href="@{/styles.css}">
    <title>Reed Catalog</title>
</head>

<body>
    <div class="container">
        <a class="button-secondary" th:href="@{/}">Home</a>
        <div class="title-container">
            <h1 th:text="${customer.name}"></h1>
            <p th:text="|Customer ID: ${customer.id()}|"></p>
        </div>
        <section th:text="|Current balance: ${customer.balance}|"></section>
        <div class="table-container">
            <div class="header-container">
                <h2>Orders</h2>
                <a class="button-primary" th:href="|@{/customer/new-order}?id=${customer.id()}|">Place new order</a>

            </div>
            <figure class="fig-table">
                <table>
                    <thead>
                    <tr>
                        <th class="cellType-index">#</th>
                        <th>Date of purchase</th>
                        <th class="cellType-num">Total price</th>
                        <th colspan="2">Amount to pay</th>
                    </tr>
                    </thead>
                    <tbody>
                    <th:block th:each="order : ${customer.orderList}">
                        <tr th:object="${order}">
                            <td class="cellType-index" th:text="*{id}"></td>
                            <td th:text="*{dateOfPurchase}"></td>
                            <td class="cellType-num" th:text="*{totalPrice}"></td>
                            <td class="cellType-num" th:text="*{amountToPay}"></td>
                            <td><a th:if="*{amountToPay>0}" class="button-primary" th:href="|@{/order/new-payment}?id=*{id}|">Pay Order</a></td>
                        </tr>
                    </th:block>
                    </tbody>
                </table>
            </figure>
        </div>
    </div>
</body>

</html>
